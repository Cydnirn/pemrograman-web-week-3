<!doctype html>
<html>
    <head>
        <title>Praktikum Minggu Ke-3</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <h1 class="title">This is a title</h1>
        <h1>Hello World</h1>
        <h2>Heading two</h2>
        <h3>Heading three</h3>
        <h4>Heading four</h4>
        <h5>Heading five</h5>
        <h6>Heading six</h6>
        <hr />
        <p>This is a paragraph</p>
        <br />
        <b>This is a bold</b>
        <br />
        <s>This is a strikethrough</s>
        <br />
        <i>This is italicized</i>
        <table border="1">
            <tr>
                <th>
                    <marquee behavior="scroll" direction="right" class="omg">
                        Text
                    </marquee>
                </th>
                <th>
                    <marquee behavior="scroll" direction="left" class="omg">
                        Text
                    </marquee>
                </th>
            </tr>
        </table>
        <br />
        <marquee behavior="scroll" direction="left">Scrolling text</marquee>
        <a href="https://github.com/Cydnirn">My Github Page</a>
        <br />
        <img
            src="https://external-content.duckduckgo.com/iu/?u=http%3A%2F%2Fkawaii-mobile.com%2Fwp-content%2Fuploads%2F2015%2F06%2FNeon-Genesis-Evangelion-Rei-Ayanami.iPhone-6-Plus-wallpaper-1080x1920.jpg&f=1&nofb=1&ipt=c113ef06923acab90f22620c29a52afee1eab17eed828e9f6c293642e9cb74a4"
            alt="An image"
            width="250px"
        />
        <hr />
        <h2>Create div block</h2>
        <div>
            <!-- Row -->
            <div>
                <div>Div 1</div>
                <div>Div 2</div>
            </div>
        </div>
        <hr />
        <h2>Create a form</h2>
        <div>
            <form action="" method="get">
                <label for="name">Name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Input your name"
                />
                <br />
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Input your name"
                />
                <br />
                <button type="submit" value="Submit">Send</button>
            </form>
        </div>
    </body>
</html>
